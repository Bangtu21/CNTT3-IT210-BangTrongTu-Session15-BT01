<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Lọc sản phẩm</h1>

<form action="/search" method="get">
    <input type="text" name="category" placeholder="Nhập danh mục" required>
    <input type="number" name="maxPrice" placeholder="Nhập giá tối đa" required>
    <button type="submit">Tìm kiếm</button>
</form>

<table th:if="${products != null}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Danh mục</th>
        <th>Giá</th>
        <th>Tồn kho</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.category}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.stockQuantity}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
